<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>The Protocol</title>
<script>
  // GitHub Pages SPA redirect: rewrite the requested path into a query string
  // that index.html will read and replace into the URL via history.replaceState.
  // Reference: https://github.com/rafgraph/spa-github-pages
  (function () {
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(0).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  }());
</script>
</head>
<body></body>
</html>
