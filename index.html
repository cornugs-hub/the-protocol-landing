    <title>The Protocol — Forja tu disciplina</title>
    <script>
      // GitHub Pages SPA redirect — restore deep-link path saved by 404.html.
      (function () {
        var q = window.location.search;
        if (q && q.indexOf('?p=/') === 0) {
          var parts = q.slice(1).split('&');
          var path = '';
          var search = '';
          parts.forEach(function (kv) {
            if (kv.indexOf('p=') === 0) path = kv.slice(2).replace(/~and~/g, '&');
            else if (kv.indexOf('q=') === 0) search = '?' + kv.slice(2).replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null,
            '',
            window.location.pathname.replace(/\/$/, '') + path + search + window.location.hash
          );
        }
      })();
    </script>
